name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Type-check, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: nova
          POSTGRES_DB: nova_vacation_homes_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nova:nova@localhost:5432/nova_vacation_homes_test
      CLIENT_DATABASE_URL: ""
      REDIS_URL: redis://localhost:6379
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ENABLE_TWILIO_VALIDATION: "false"
      ENABLE_PROMPT_CACHING: "false"
      CLAUDE_MODEL: claude-haiku-4-5-20251001  # cheapest model for CI tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run migrations
        run: |
          PGPASSWORD=nova psql -h localhost -U nova -d nova_vacation_homes_test -f src/db/schema.sql

      - name: Unit tests
        run: npm test -- --coverage --forceExit

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nova-voice-agent:${{ github.sha }} .

      - name: Run health check on built image
        run: |
          docker run -d --name test-agent \
            -e NODE_ENV=test \
            -e DATABASE_URL=postgresql://x:x@localhost/x \
            -e REDIS_URL=redis://localhost:6379 \
            -e ANTHROPIC_API_KEY=test \
            -p 3001:3000 \
            nova-voice-agent:${{ github.sha }} || true
          # Just verify the image builds and starts
          docker rm -f test-agent || true
