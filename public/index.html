<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Voice Agent — Test Lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0c0c0f;
      --surface:      #16161b;
      --surface2:     #1f1f26;
      --surface3:     #2a2a33;
      --accent:       #6366f1;
      --accent-light: #818cf8;
      --accent-glow:  rgba(99,102,241,0.25);
      --agent-bg:     #1a2035;
      --agent-border: rgba(99,102,241,0.2);
      --user-bg:      #1f2028;
      --text:         #e2e2ee;
      --text-dim:     #5a5a72;
      --text-mid:     #8888a8;
      --green:        #22c55e;
      --red:          #ef4444;
      --yellow:       #f59e0b;
      --radius:       14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    .logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-text h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
    .header-text p  { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      font-size: 11px;
      color: var(--text-mid);
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }
    .dot.ready    { background: var(--text-dim); }
    .dot.active   { background: var(--green); }
    .dot.thinking { background: var(--accent); animation: blink 1s infinite; }
    .dot.error    { background: var(--red); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Context strip ── */
    #contextBar {
      display: none;
      gap: 10px;
      padding: 5px 20px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .ctx-item { display: flex; align-items: center; gap: 4px; }

    .tag {
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 500;
      font-size: 11px;
    }
    .tag.state  { background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .tag.intent { background: rgba(34,197,94,0.12);  color: #86efac; }
    .tag.lang   { background: rgba(251,191,36,0.12); color: #fcd34d; }

    /* ── Chat ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

    /* Empty state */
    #emptyState {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-dim);
      text-align: center;
      padding: 40px 20px;
    }

    .empty-icon {
      width: 64px; height: 64px;
      border-radius: 20px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin-bottom: 6px;
    }

    #emptyState strong { color: var(--text-mid); font-size: 15px; }
    #emptyState span   { font-size: 12px; }

    /* Message rows */
    .msg-row {
      display: flex;
      gap: 8px;
      max-width: 80%;
      animation: rise 0.2s ease;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.agent { align-self: flex-start; }

    .avatar {
      width: 26px; height: 26px;
      border-radius: 7px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      margin-top: 3px;
    }

    .msg-row.agent .avatar { background: var(--accent); color: white; }
    .msg-row.user  .avatar { background: var(--surface3); color: var(--text-mid); }

    .bubble {
      padding: 10px 13px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 13.5px;
    }

    .msg-row.agent .bubble {
      background: var(--agent-bg);
      border: 1px solid var(--agent-border);
      border-bottom-left-radius: 4px;
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(255,255,255,0.07);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    /* Thinking indicator */
    .thinking-row {
      display: flex; gap: 8px;
      align-self: flex-start;
      animation: rise 0.2s ease;
    }

    .thinking-bubble {
      background: var(--agent-bg);
      border: 1px solid var(--agent-border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex; gap: 5px; align-items: center;
    }

    .bounce {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: bounce 1.3s ease-in-out infinite;
    }
    .bounce:nth-child(2) { animation-delay: 0.18s; }
    .bounce:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-7px); }
    }

    /* System messages */
    .sys-msg {
      align-self: center;
      font-size: 11px;
      color: var(--text-dim);
      padding: 3px 10px;
      background: var(--surface2);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* ── Controls ── */
    #controls {
      padding: 16px 20px 24px;
      background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #interimText {
      min-height: 18px;
      font-size: 12px;
      color: var(--text-mid);
      font-style: italic;
      text-align: center;
      transition: opacity 0.2s;
      max-width: 480px;
    }

    /* Mic button */
    .mic-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .mic-ring {
      position: absolute;
      width: 76px; height: 76px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      pointer-events: none;
    }

    .mic-ring.pulse { animation: ring 1.6s ease-out infinite; }

    @keyframes ring {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.7); opacity: 0; }
    }

    #micBtn {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px var(--accent-glow);
      z-index: 1;
      flex-shrink: 0;
    }

    #micBtn:hover:not(:disabled)  { background: var(--accent-light); transform: scale(1.06); }
    #micBtn:active:not(:disabled) { transform: scale(0.96); }

    #micBtn.listening {
      background: var(--red);
      box-shadow: 0 4px 20px rgba(239,68,68,0.3);
    }

    #micBtn:disabled { opacity: 0.35; cursor: not-allowed; }

    #micBtn svg { width: 22px; height: 22px; fill: currentColor; }

    /* Button row below mic */
    .btn-row {
      display: flex; gap: 8px; align-items: center;
    }

    .btn {
      padding: 6px 12px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--text-mid);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    .btn.danger {
      border-color: rgba(239,68,68,0.3);
      color: #f87171;
    }
    .btn.danger:hover { background: rgba(239,68,68,0.1); }

    /* Text input fallback */
    #textFallback {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 480px;
    }

    #textFallback p { font-size: 11px; color: var(--red); text-align: center; }

    .text-row {
      display: flex; gap: 6px; width: 100%;
    }

    #textInput {
      flex: 1;
      padding: 9px 12px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.12);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    #textInput:focus { border-color: var(--accent); }

    #sendBtn {
      padding: 9px 14px;
      border-radius: 9px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #sendBtn:hover { background: var(--accent-light); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 9px 16px;
      background: var(--surface3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px;
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      animation: rise 0.2s ease;
      z-index: 200;
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">🏠</div>
  <div class="header-text">
    <h1>Nova Voice Agent</h1>
    <p>Browser test lab — no phone required</p>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="dot ready" id="dot"></div>
      <span id="statusLabel">Ready</span>
    </div>
  </div>
</header>

<!-- Context strip -->
<div id="contextBar">
  <div class="ctx-item">State: <span class="tag state" id="stateTag">—</span></div>
  <div class="ctx-item">Intent: <span class="tag intent" id="intentTag">—</span></div>
  <div class="ctx-item">Lang: <span class="tag lang" id="langTag">en</span></div>
</div>

<!-- Chat -->
<div id="chat">
  <div id="emptyState">
    <div class="empty-icon">🎙</div>
    <strong>Press the mic to start a call</strong>
    <span>Speak naturally — the agent will respond in real time</span>
  </div>
</div>

<!-- Controls -->
<div id="controls">
  <div id="interimText"></div>

  <div class="mic-wrap">
    <div class="mic-ring" id="micRing"></div>
    <button id="micBtn" title="Click to speak">
      <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 17.93V21H9v2h6v-2h-2v-2.07A8 8 0 0 0 20 11h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 6.93z"/></svg>
    </button>
  </div>

  <div class="btn-row" id="btnRow" style="display:none">
    <button class="btn" id="muteBtn">🔇 Mute voice</button>
    <button class="btn danger" id="endBtn">End call</button>
  </div>

  <!-- Fallback for browsers without Web Speech API -->
  <div id="textFallback">
    <p>⚠ Speech recognition unavailable — type your messages below</p>
    <div class="text-row">
      <input id="textInput" type="text" placeholder="Type a message…" autocomplete="off" />
      <button id="sendBtn">Send</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let sessionId   = null;
let agentBusy   = false;
let ttsOn       = true;
let listening   = false;
let recognition = null;
let pendingText = '';

// ── DOM refs ───────────────────────────────────────────────────────────────────
const chat        = document.getElementById('chat');
const emptyState  = document.getElementById('emptyState');
const micBtn      = document.getElementById('micBtn');
const micRing     = document.getElementById('micRing');
const btnRow      = document.getElementById('btnRow');
const muteBtn     = document.getElementById('muteBtn');
const endBtn      = document.getElementById('endBtn');
const contextBar  = document.getElementById('contextBar');
const stateTag    = document.getElementById('stateTag');
const intentTag   = document.getElementById('intentTag');
const langTag     = document.getElementById('langTag');
const dot         = document.getElementById('dot');
const statusLabel = document.getElementById('statusLabel');
const interimText = document.getElementById('interimText');
const textFallback= document.getElementById('textFallback');

// ── Speech recognition setup ───────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SR) {
  recognition = new SR();
  recognition.lang            = 'en-US';
  recognition.interimResults  = true;
  recognition.continuous      = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (const r of e.results) {
      if (r.isFinal) final   += r[0].transcript;
      else           interim += r[0].transcript;
    }
    interimText.textContent = interim || final;
    if (final) pendingText = final;
  };

  recognition.onend = async () => {
    setListening(false);
    const msg = pendingText.trim();
    pendingText = '';
    interimText.textContent = '';
    if (msg) await sendMessage(msg);
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') { setListening(false); return; }
    setListening(false);
    toast(`Mic error: ${e.error}`);
  };

  micBtn.addEventListener('click', async () => {
    if (agentBusy) return;
    if (listening) { recognition.stop(); return; }
    if (!sessionId) await startSession();
    if (!sessionId) return; // startSession failed
    pendingText = '';
    setListening(true);
    try { recognition.start(); }
    catch { setListening(false); }
  });

} else {
  // No Web Speech API — show text input instead
  micBtn.style.display  = 'none';
  textFallback.style.display = 'flex';

  const textInput = document.getElementById('textInput');
  const sendBtn   = document.getElementById('sendBtn');

  const submitText = async () => {
    const msg = textInput.value.trim();
    if (!msg || agentBusy) return;
    textInput.value = '';
    if (!sessionId) await startSession();
    if (!sessionId) return;
    await sendMessage(msg);
  };

  sendBtn.addEventListener('click', submitText);
  textInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitText(); });
}

// ── Session ────────────────────────────────────────────────────────────────────
async function startSession() {
  setStatus('thinking', 'Starting…');
  try {
    const res  = await fetch('/api/start', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');

    sessionId = data.sessionId;
    emptyState.style.display  = 'none';
    contextBar.style.display  = 'flex';
    btnRow.style.display      = 'flex';
    stateTag.textContent      = 'GREETING';

    addMessage('agent', data.greeting);
    speak(data.greeting);
    setStatus('active', 'Call active');
  } catch (err) {
    setStatus('error', 'Error');
    toast('Could not start — is the server running?');
    sessionId = null;
  }
}

async function sendMessage(text) {
  if (!text || agentBusy) return;
  agentBusy = true;
  setStatus('thinking', 'Thinking…');
  addMessage('user', text);
  const thinkEl = addThinking();

  try {
    const res  = await fetch('/api/message', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ sessionId, message: text }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');

    thinkEl.remove();
    addMessage('agent', data.response);
    speak(data.response);

    stateTag.textContent  = data.state  || '—';
    intentTag.textContent = data.topIntent || '—';
    langTag.textContent   = data.language  || 'en';

    if (data.state === 'ESCALATED') {
      toast('📞 Escalated to human agent');
      setStatus('idle', 'Escalated');
      await doEndSession(false);
    } else if (data.state === 'CLOSED') {
      setStatus('idle', 'Ended');
      await doEndSession(false);
    } else {
      setStatus('active', 'Call active');
    }
  } catch (err) {
    thinkEl.remove();
    toast('Request failed — check server logs');
    setStatus('active', 'Call active');
  } finally {
    agentBusy = false;
  }
}

async function doEndSession(callApi = true) {
  if (callApi && sessionId) {
    await fetch('/api/end', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ sessionId }),
    }).catch(() => {});
  }
  sessionId = null;
  contextBar.style.display = 'none';
  btnRow.style.display     = 'none';
  setStatus('ready', 'Ready');
  addSysMsg('Call ended');
  window.speechSynthesis?.cancel();
}

endBtn.addEventListener('click', () => doEndSession(true));

// ── UI helpers ─────────────────────────────────────────────────────────────────
function addMessage(role, text) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'agent' ? 'N' : 'Y';

  const bbl = document.createElement('div');
  bbl.className = 'bubble';
  bbl.textContent = text;

  row.appendChild(av);
  row.appendChild(bbl);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function addThinking() {
  const row = document.createElement('div');
  row.className = 'thinking-row';
  row.innerHTML = `
    <div class="avatar" style="background:var(--accent);color:white;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:3px">N</div>
    <div class="thinking-bubble">
      <div class="bounce"></div>
      <div class="bounce"></div>
      <div class="bounce"></div>
    </div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function addSysMsg(text) {
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function setListening(on) {
  listening = on;
  micBtn.classList.toggle('listening', on);
  micRing.classList.toggle('pulse', on);
  if (!on) interimText.textContent = '';
}

function setStatus(mode, label) {
  statusLabel.textContent = label;
  dot.className = `dot ${mode}`;
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ── TTS ────────────────────────────────────────────────────────────────────────
const synth = window.speechSynthesis;

function speak(text) {
  if (!ttsOn || !synth) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate  = 1.05;
  utt.pitch = 1;
  // Prefer a natural English voice if available
  const voices   = synth.getVoices();
  const preferred = voices.find(v =>
    v.name.includes('Samantha') ||
    v.name.includes('Google US') ||
    (v.lang === 'en-US' && !v.name.includes('Google'))
  ) || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utt.voice = preferred;
  synth.speak(utt);
}

if (synth) synth.onvoiceschanged = () => {}; // trigger voice load

muteBtn.addEventListener('click', () => {
  ttsOn = !ttsOn;
  muteBtn.textContent = ttsOn ? '🔇 Mute voice' : '🔊 Unmute voice';
  if (!ttsOn) synth?.cancel();
});
</script>
</body>
</html>
